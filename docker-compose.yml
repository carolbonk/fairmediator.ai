version: '3.8'

# Explicit project naming for isolation
# This ensures FairMediator containers/networks/volumes are separate from other projects
name: fairmediator

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: fairmediator
    # Only expose to host if needed for external tools (comment out for full isolation)
    ports:
      - "127.0.0.1:27017:27017"  # Bind to localhost only for security
    volumes:
      - fairmediator_mongodb_data:/data/db
      - fairmediator_mongodb_config:/data/configdb
    networks:
      - db-network  # Isolated database network
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 50% for safety (2 cores, 12GB total)
    deploy:
      resources:
        limits:
          cpus: '0.25'     # 0.25 cores max (12.5% of 2-core safety limit)
          memory: 1G       # 1GB max (8.3% of 12GB safety limit)
        reservations:
          cpus: '0.125'    # Reserve 0.125 cores
          memory: 512M     # Reserve 512MB
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/fairmediator --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true  # Read-only root filesystem
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5001
      MONGODB_URI: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme}@mongodb:27017/fairmediator?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      HUGGINGFACE_DAILY_LIMIT: ${HUGGINGFACE_DAILY_LIMIT:-333}
      RESEND_DAILY_LIMIT: ${RESEND_DAILY_LIMIT:-50}
      SCRAPING_DAILY_LIMIT: ${SCRAPING_DAILY_LIMIT:-450}
      # Axiom Logging
      AXIOM_DATASET: ${AXIOM_DATASET}
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_ORG_ID: ${AXIOM_ORG_ID}
      AXIOM_ENABLED: ${AXIOM_ENABLED:-true}
      # Oracle Cloud Limits
      ORACLE_CPU_LIMIT: ${ORACLE_CPU_LIMIT:-4}
      ORACLE_RAM_LIMIT: ${ORACLE_RAM_LIMIT:-24576}
      ORACLE_STORAGE_LIMIT: ${ORACLE_STORAGE_LIMIT:-204800}
      ORACLE_BANDWIDTH_LIMIT: ${ORACLE_BANDWIDTH_LIMIT:-10240}
      ORACLE_BANDWIDTH_DAILY_LIMIT: ${ORACLE_BANDWIDTH_DAILY_LIMIT:-340}
    # Only expose to localhost for security
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./backend/src:/app/src:ro  # Read-only source code
      - ./backend/logs:/app/logs  # Writable logs directory
      - fairmediator_backend_node_modules:/app/node_modules
    networks:
      - backend-network  # Can communicate with both frontend and database
      - db-network
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 50% for safety (2 cores, 12GB total)
    deploy:
      resources:
        limits:
          cpus: '1.5'      # 1.5 cores max (75% of 2-core safety limit)
          memory: 9G       # 9GB max (75% of 12GB safety limit)
        reservations:
          cpus: '0.75'     # Reserve 0.75 cores
          memory: 4G       # Reserve 4GB
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Only allow binding to ports

  # Frontend application
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
    # Expose to host or use reverse proxy
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    networks:
      - backend-network  # Can communicate with backend
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 50% for safety (2 cores, 12GB total)
    deploy:
      resources:
        limits:
          cpus: '0.25'     # 0.25 cores max (12.5% of 2-core safety limit)
          memory: 2G       # 2GB max (16.7% of 12GB safety limit)
        reservations:
          cpus: '0.125'    # Reserve 0.125 cores
          memory: 1G       # Reserve 1GB
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true  # Nginx serves static files, no writes needed
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m
      - /tmp:noexec,nosuid,size=50m

volumes:
  # Project-scoped volumes with explicit naming for isolation
  fairmediator_mongodb_data:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_mongodb_data
  fairmediator_mongodb_config:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_mongodb_config
  fairmediator_backend_node_modules:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_backend_node_modules

networks:
  # Segmented networks for defense in depth
  # Database network - only backend can access
  db-network:
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_db_network
    driver: bridge
    internal: false  # Set to true if DB should never reach internet
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Backend network - frontend and backend communicate here
  backend-network:
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_backend_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
