version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: fairmediator-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: fairmediator
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - fairmediator-network
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 85% for safety (3 cores, 20.89GB total)
    deploy:
      resources:
        limits:
          cpus: '0.5'      # 0.5 cores max (16.7% of 3-core safety limit)
          memory: 2G       # 2GB max (9.6% of 20.89GB safety limit)
        reservations:
          cpus: '0.25'     # Reserve 0.25 cores
          memory: 1G       # Reserve 1GB
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/fairmediator --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fairmediator-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5001
      MONGODB_URI: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme}@mongodb:27017/fairmediator?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      HUGGINGFACE_DAILY_LIMIT: ${HUGGINGFACE_DAILY_LIMIT:-333}
      RESEND_DAILY_LIMIT: ${RESEND_DAILY_LIMIT:-50}
      SCRAPING_DAILY_LIMIT: ${SCRAPING_DAILY_LIMIT:-450}
      # Axiom Logging
      AXIOM_DATASET: ${AXIOM_DATASET}
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_ORG_ID: ${AXIOM_ORG_ID}
      AXIOM_ENABLED: ${AXIOM_ENABLED:-true}
      # Oracle Cloud Limits
      ORACLE_CPU_LIMIT: ${ORACLE_CPU_LIMIT:-4}
      ORACLE_RAM_LIMIT: ${ORACLE_RAM_LIMIT:-24576}
      ORACLE_STORAGE_LIMIT: ${ORACLE_STORAGE_LIMIT:-204800}
      ORACLE_BANDWIDTH_LIMIT: ${ORACLE_BANDWIDTH_LIMIT:-10240}
      ORACLE_BANDWIDTH_DAILY_LIMIT: ${ORACLE_BANDWIDTH_DAILY_LIMIT:-340}
    ports:
      - "5001:5001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
      - backend_node_modules:/app/node_modules
    networks:
      - fairmediator-network
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 85% for safety (3 cores, 20.89GB total)
    deploy:
      resources:
        limits:
          cpus: '2'        # 2 cores max (66.7% of 3-core safety limit)
          memory: 14G      # 14GB max (67% of 20.89GB safety limit)
        reservations:
          cpus: '1'        # Reserve 1 core
          memory: 7G       # Reserve 7GB
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend application
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fairmediator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
    ports:
      - "3000:8080"
    networks:
      - fairmediator-network
    # ORACLE CLOUD ALWAYS FREE LIMITS: Set to 85% for safety (3 cores, 20.89GB total)
    deploy:
      resources:
        limits:
          cpus: '0.5'      # 0.5 cores max (16.7% of 3-core safety limit)
          memory: 4G       # 4GB max (19.1% of 20.89GB safety limit)
        reservations:
          cpus: '0.25'     # Reserve 0.25 cores
          memory: 2G       # Reserve 2GB
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_node_modules:
    driver: local

networks:
  fairmediator-network:
    driver: bridge
