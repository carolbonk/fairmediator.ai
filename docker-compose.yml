# ==============================================================================
# FairMediator Docker Compose Configuration
# ==============================================================================
#
# CONFIGURATION PHILOSOPHY
# ------------------------
# - Explicit project naming (fairmediator) for network/volume/container isolation
# - Localhost-only port bindings for development security (127.0.0.1:PORT)
# - Network segmentation: separate db-network and backend-network for defense in depth
# - Health checks on all services for proper orchestration and monitoring
# - Read-only filesystems where possible (MongoDB, Frontend) for security hardening
# - Minimal capabilities: drop ALL, add only NET_BIND_SERVICE
#
# CLOUD INFRASTRUCTURE RESOURCE CONSTRAINTS
# -----------------------------------------
# Total Available Resources:
#   - CPU: 4 cores
#   - RAM: 24 GB
#   - Storage: 200 GB
#   - Bandwidth: 10 TB/month
#
# Safety Strategy: Use 50% of resources (2 cores, 12GB RAM) to prevent throttling
#
# Current Allocation Across Services:
#   - MongoDB:  0.25 cores,  1 GB RAM   (12.5% CPU,  8.3% RAM)
#   - Backend:  1.00 cores,  2 GB RAM   (50.0% CPU, 16.7% RAM)
#   - Frontend: 0.25 cores,  2 GB RAM   (12.5% CPU, 16.7% RAM)
#   ------------------------------------
#   TOTAL:      1.50 cores,  5 GB RAM   (75% CPU,  41.7% RAM of safety limit)
#
# Headroom: 0.5 cores, 7GB RAM available for monitoring stack (Prometheus, Grafana)
# See DOCKER_MANAGEMENT_GUIDE.md for monitoring deployment options
#
# ==============================================================================

name: fairmediator

services:
  # ===========================================================================
  # MongoDB Database Service
  # ===========================================================================
  # Responsibilities: Persistent data storage, vector search, user authentication
  # Resource allocation: 0.25 CPU cores, 1GB RAM (see philosophy section above)
  # Security: Read-only filesystem, localhost-only port, isolated network
  # ===========================================================================
  mongodb:
    image: mongo:7
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: fairmediator
    ports:
      - "127.0.0.1:4030:27017"  # MongoDB (FairMediator port range: 4000-4499)
    volumes:
      - fairmediator_mongodb_data:/data/db
      - fairmediator_mongodb_config:/data/configdb
    networks:
      - db-network  # Isolated database network
    labels:
      # Portainer organization
      com.fairmediator.service: "mongodb"
      com.fairmediator.description: "MongoDB database for FairMediator data"
      com.fairmediator.stack: "application"
      com.fairmediator.tier: "database"
      com.fairmediator.version: "7"
      # Watchtower auto-update
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "fairmediator"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 1G
        reservations:
          cpus: '0.125'
          memory: 512M
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/fairmediator --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ===========================================================================
  # Backend API Service
  # ===========================================================================
  # Responsibilities: REST API, authentication, rate limiting, external API calls
  # Resource allocation: 1.0 CPU cores, 2GB RAM (optimized from 9GB!)
  # Security: Localhost-only port, minimal capabilities, environment-based secrets
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4010}
      # Database
      MONGODB_URI: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme}@mongodb:27017/fairmediator?authSource=admin
      # Security secrets
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      # External API keys and rate limits
      AI_API_KEY: ${AI_API_KEY}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-333}
      EMAIL_API_KEY: ${EMAIL_API_KEY}
      EMAIL_DAILY_LIMIT: ${EMAIL_DAILY_LIMIT:-50}
      SCRAPING_DAILY_LIMIT: ${SCRAPING_DAILY_LIMIT:-450}
      # Monitoring and logging
      LOGGING_DATASET: ${LOGGING_DATASET}
      LOGGING_TOKEN: ${LOGGING_TOKEN}
      LOGGING_ORG_ID: ${LOGGING_ORG_ID}
      LOGGING_ENABLED: ${LOGGING_ENABLED:-true}
      # Infrastructure limits (for runtime monitoring)
      CLOUD_CPU_LIMIT: ${CLOUD_CPU_LIMIT:-4}
      CLOUD_RAM_LIMIT: ${CLOUD_RAM_LIMIT:-24576}
      CLOUD_STORAGE_LIMIT: ${CLOUD_STORAGE_LIMIT:-204800}
      CLOUD_BANDWIDTH_LIMIT: ${CLOUD_BANDWIDTH_LIMIT:-10240}
      CLOUD_BANDWIDTH_DAILY_LIMIT: ${CLOUD_BANDWIDTH_DAILY_LIMIT:-340}
    ports:
      - "127.0.0.1:4001:4001"  # Backend API (FairMediator port range: 4000-4499)
    volumes:
      - ./backend/src:/app/src:ro  # Read-only source code
      - ./backend/logs:/app/logs  # Writable logs directory
      - fairmediator_backend_node_modules:/app/node_modules
    networks:
      - backend-network  # Can communicate with both frontend and database
      - db-network
    labels:
      # Portainer organization
      com.fairmediator.service: "backend"
      com.fairmediator.description: "Node.js API server with Express"
      com.fairmediator.stack: "application"
      com.fairmediator.tier: "api"
      com.fairmediator.language: "nodejs"
      # Watchtower auto-update
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "fairmediator"
      # Traefik routing (if using Traefik)
      traefik.enable: "true"
      traefik.http.routers.backend.rule: "Host(`api.fairmediator.localhost`) || Host(`localhost`) && PathPrefix(`/api`)"
      traefik.http.services.backend.loadbalancer.server.port: "4001"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ===========================================================================
  # Frontend Web Service
  # ===========================================================================
  # Responsibilities: React SPA served via Nginx, static asset delivery
  # Resource allocation: 0.25 CPU cores, 2GB RAM
  # Security: Read-only filesystem, localhost-only in dev, minimal capabilities
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4001}
    ports:
      - "127.0.0.1:4010:8080"  # Frontend (FairMediator port range: 4000-4499)
    networks:
      - backend-network  # Can communicate with backend
    labels:
      # Portainer organization
      com.fairmediator.service: "frontend"
      com.fairmediator.description: "React frontend with Vite and Nginx"
      com.fairmediator.stack: "application"
      com.fairmediator.tier: "web"
      com.fairmediator.language: "react"
      # Watchtower auto-update
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "fairmediator"
      # Traefik routing (if using Traefik)
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "Host(`fairmediator.localhost`) || Host(`localhost`)"
      traefik.http.services.frontend.loadbalancer.server.port: "8080"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 2G
        reservations:
          cpus: '0.125'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m
      - /tmp:noexec,nosuid,size=50m

# ==============================================================================
# PERSISTENT VOLUMES
# ==============================================================================
# All volumes use explicit naming with project prefix for isolation
# Prevents conflicts with other Docker projects on the same host
# ==============================================================================
volumes:
  fairmediator_mongodb_data:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_mongodb_data
  fairmediator_mongodb_config:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_mongodb_config
  fairmediator_backend_node_modules:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_backend_node_modules

# ==============================================================================
# NETWORK SEGMENTATION
# ==============================================================================
# Defense in depth: Services only join networks they need
#   - db-network: MongoDB ← → Backend only (database isolation)
#   - backend-network: Frontend ← → Backend only (API communication)
# Frontend cannot directly access database, must go through Backend API
# ==============================================================================
networks:
  db-network:
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_db_network
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend-network:
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_backend_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
