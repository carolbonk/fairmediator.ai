# Prometheus Configuration for FairMediator
# Scrapes metrics from all containers and services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fairmediator'
    environment: 'production'

# Alerting configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          stack: 'management'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          stack: 'management'

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          stack: 'management'

  # FairMediator Backend - Application metrics
  # Uncomment when you add a /metrics endpoint to your backend
  # - job_name: 'fairmediator-backend'
  #   static_configs:
  #     - targets: ['fairmediator-backend:5001']
  #       labels:
  #         service: 'backend'
  #         stack: 'application'

  # MongoDB Exporter (optional - requires mongodb_exporter container)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']
  #       labels:
  #         service: 'mongodb'
  #         stack: 'database'

  # Portainer metrics (if available)
  # - job_name: 'portainer'
  #   static_configs:
  #     - targets: ['portainer:9000']
  #       labels:
  #         service: 'portainer'
  #         stack: 'management'
