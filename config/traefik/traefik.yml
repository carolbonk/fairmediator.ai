# Traefik Static Configuration
# This file can override command-line options from docker-compose

# API and Dashboard
api:
  dashboard: true
  insecure: true  # Dashboard on :8080 without auth (localhost only)

# Docker Provider
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "fairmediator_backend_network"
    watch: true

# Entry Points
entryPoints:
  web:
    address: ":80"
    # Redirect HTTP to HTTPS
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    # Uncomment for Let's Encrypt
    # http:
    #   tls:
    #     certResolver: letsencrypt

# Certificate Resolvers (Let's Encrypt)
# Uncomment for production with real domains
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: your-email@example.com
#       storage: /letsencrypt/acme.json
#       httpChallenge:
#         entryPoint: web

# Logging
log:
  level: INFO
  format: common

accessLog:
  format: common
