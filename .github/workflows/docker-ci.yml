name: Docker CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  # Run CodeQL security scan first
  security-scan:
    name: Security Scan
    uses: ./.github/workflows/codeql.yml
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

  # Build and push Docker images only if security scan passes
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: github.event_name != 'pull_request'

  # Automation trigger - sends deployment event to N8N for orchestration
  notify:
    name: Trigger Automation Workflows
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Log deployment success
        run: |
          echo "✅ Docker images built and pushed successfully"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest"

      - name: Send webhook to N8N (automation orchestration)
        if: secrets.N8N_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "deployment_success",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "commit_sha": "${{ github.sha }}",
              "author": "${{ github.event.head_commit.author.name }}",
              "repository": "${{ github.repository }}",
              "backend_image": "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest",
              "frontend_image": "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest",
              "branch": "${{ github.ref_name }}",
              "trigger_actions": [
                "check_quota",
                "scrape_fec_batch",
                "aggregate_logs",
                "generate_blog_post"
              ]
            }'
        continue-on-error: true

      - name: Trigger backend automation endpoint (optional)
        if: secrets.BACKEND_URL != ''
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/automation/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -d '{
              "workflow": "quota-check-alert",
              "data": {
                "source": "github_actions",
                "commit": "${{ github.sha }}"
              }
            }'
        continue-on-error: true
