name: Deploy to Oracle Cloud

on:
  workflow_run:
    workflows: ["Docker CI/CD"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:  # Manual deployment trigger

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend:latest
  FRONTEND_IMAGE: ${{ github.repository }}/frontend:latest

jobs:
  # Pre-deployment checks
  pre-deploy-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    outputs:
      safe-to-deploy: ${{ steps.quota-check.outputs.safe }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Oracle Cloud resource limits
        id: quota-check
        run: |
          echo "🔍 Checking Oracle Cloud resource availability..."

          # Check if Oracle instance monitoring endpoint is available
          if [ -z "${{ secrets.ORACLE_INSTANCE_URL }}" ]; then
            echo "⚠️  ORACLE_INSTANCE_URL not set - skipping quota check"
            echo "safe=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query the monitoring endpoint
          RESPONSE=$(curl -s -w "\n%{http_code}" "${{ secrets.ORACLE_INSTANCE_URL }}/api/monitoring/oracle-cloud/safe-to-deploy" || echo "000")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            SAFE=$(echo "$BODY" | jq -r '.safe // "false"')
            if [ "$SAFE" = "true" ]; then
              echo "✅ Safe to deploy - resources within limits"
              echo "safe=true" >> $GITHUB_OUTPUT
            else
              echo "❌ Deployment blocked - Oracle Cloud resources at capacity"
              echo "$BODY" | jq -r '.reason // "Unknown reason"'
              echo "safe=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️  Could not reach monitoring endpoint - deploying with caution"
            echo "safe=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Monitoring endpoint returned $HTTP_CODE - proceeding anyway"
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Verify Docker images exist
        run: |
          echo "🔍 Verifying Docker images are available..."

          # Check if images were pushed successfully
          echo "Backend image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}"

          # Images will be pulled by Oracle instance, so just log for now
          echo "✅ Image references validated"

  # Deploy to Oracle Cloud
  deploy:
    name: Deploy to Oracle Cloud Instance
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.safe-to-deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key

          # Add Oracle instance to known hosts
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Oracle Cloud
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "🚀 Deploying to Oracle Cloud..."

          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no ${ORACLE_USER}@${ORACLE_HOST} << 'ENDSSH'
            set -e

            echo "📂 Navigating to application directory..."
            cd ~/fairmediator.ai || cd ~/FairMediator || { echo "❌ App directory not found"; exit 1; }

            echo "📥 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main

            echo "🔐 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "🐳 Pulling latest Docker images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "🛑 Stopping current containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down

            echo "🚀 Starting updated containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "⏳ Waiting for services to be healthy..."
            sleep 10

            echo "🔍 Checking container status..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health check
        run: |
          echo "🏥 Running health checks..."

          # Wait a bit for services to fully start
          sleep 15

          # Check backend health
          BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.ORACLE_INSTANCE_URL }}/health" || echo "000")

          if [ "$BACKEND_HEALTH" = "200" ]; then
            echo "✅ Backend is healthy (HTTP $BACKEND_HEALTH)"
          else
            echo "⚠️  Backend health check returned HTTP $BACKEND_HEALTH"
          fi

          # Check frontend
          FRONTEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.ORACLE_INSTANCE_URL }}" || echo "000")

          if [ "$FRONTEND_HEALTH" = "200" ]; then
            echo "✅ Frontend is healthy (HTTP $FRONTEND_HEALTH)"
          else
            echo "⚠️  Frontend health check returned HTTP $FRONTEND_HEALTH"
          fi

          # Overall assessment
          if [ "$BACKEND_HEALTH" = "200" ] && [ "$FRONTEND_HEALTH" = "200" ]; then
            echo "🎉 All services are healthy!"
          else
            echo "⚠️  Some services may need attention"
            exit 1
          fi

      - name: Verify resource usage post-deployment
        run: |
          echo "📊 Checking post-deployment resource usage..."

          USAGE=$(curl -s "${{ secrets.ORACLE_INSTANCE_URL }}/api/monitoring/oracle-cloud" || echo "{}")

          echo "$USAGE" | jq -r '.summary.message // "No monitoring data available"'

          # Check for critical alerts
          HAS_CRITICAL=$(echo "$USAGE" | jq -r '.alerts.hasCritical // false')

          if [ "$HAS_CRITICAL" = "true" ]; then
            echo "⚠️  Critical resource alerts detected!"
            echo "$USAGE" | jq -r '.alerts.critical[]'
          else
            echo "✅ Resource usage within safe limits"
          fi

      - name: Clean up old Docker resources
        run: |
          echo "🧹 Cleaning up old Docker resources on Oracle instance..."

          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} << 'ENDSSH'
            # Remove unused images and containers
            docker system prune -f

            # Remove dangling images
            docker image prune -f

            echo "✅ Cleanup complete"
          ENDSSH

  # Notify on deployment result
  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy]
    if: always()

    steps:
      - name: Deployment success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment to Oracle Cloud succeeded!"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: Deployment failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment to Oracle Cloud failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Check logs for details"
          exit 1

      - name: Send webhook notification (optional)
        if: secrets.N8N_WEBHOOK_URL != ''
        run: |
          STATUS="${{ needs.deploy.result }}"

          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"oracle_deployment\",
              \"status\": \"$STATUS\",
              \"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"deployed_by\": \"${{ github.actor }}\",
              \"repository\": \"${{ github.repository }}\"
            }"
        continue-on-error: true
