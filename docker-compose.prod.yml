# ==============================================================================
# Docker Compose Production Override for Cloud Deployment
# ==============================================================================
#
# USAGE:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# PURPOSE:
#   - Use pre-built images from GitHub Container Registry (GHCR)
#   - Expose ports publicly through Traefik reverse proxy
#   - Production-optimized settings with automatic HTTPS
#
# This file OVERRIDES settings from docker-compose.yml for production deployment.
# ==============================================================================

services:
  # ===========================================================================
  # Traefik Reverse Proxy (HTTPS/SSL Termination)
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    container_name: ${COMPOSE_PROJECT_NAME:-fairmediator}-traefik
    restart: unless-stopped
    command:
      # API and Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=fairmediator_backend_network"
      # Entry points
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (automatic SSL)
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-carolainebonk@gmail.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "8080:8080"  # Traefik Dashboard (localhost only, use SSH tunnel)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - backend-network
    labels:
      # Enable Traefik dashboard
      traefik.enable: "true"
      traefik.http.routers.dashboard.rule: "Host(`traefik.fairmediator.ai`)"
      traefik.http.routers.dashboard.service: "api@internal"
      traefik.http.routers.dashboard.entrypoints: "websecure"
      traefik.http.routers.dashboard.tls.certresolver: "letsencrypt"
      # Dashboard auth (change password!)
      traefik.http.routers.dashboard.middlewares: "dashboard-auth"
      traefik.http.middlewares.dashboard-auth.basicauth.users: "admin:$$apr1$$8EVjn/nj$$GiLUZqcbueTFeD23SuB6x0"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

services:
  # Backend: Use pre-built image from GHCR
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-carolbonk/fairmediator}/backend:${IMAGE_TAG:-latest}
    build: null  # Disable build - use pre-built image only
    volumes:
      # Remove dev volume mounts in production
      - ./backend/logs:/app/logs  # Keep logs only
      - fairmediator_backend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:4001:4001"  # Keep localhost binding for direct access (debugging)
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://fairmediator.ai
    labels:
      # Traefik routing for backend API
      traefik.enable: "true"
      traefik.http.routers.backend.rule: "Host(`api.fairmediator.ai`)"
      traefik.http.routers.backend.entrypoints: "websecure"
      traefik.http.routers.backend.tls.certresolver: "letsencrypt"
      traefik.http.services.backend.loadbalancer.server.port: "4001"
      # CORS middleware
      traefik.http.middlewares.backend-cors.headers.accesscontrolallowmethods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      traefik.http.middlewares.backend-cors.headers.accesscontrolalloworiginlist: "https://fairmediator.ai"
      traefik.http.middlewares.backend-cors.headers.accesscontrolallowcredentials: "true"
      traefik.http.middlewares.backend-cors.headers.accesscontrolallowheaders: "Content-Type,Authorization,X-CSRF-Token"
      traefik.http.routers.backend.middlewares: "backend-cors"

  # Frontend: Use pre-built image from GHCR
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-carolbonk/fairmediator}/frontend:${IMAGE_TAG:-latest}
    build: null  # Disable build - use pre-built image only
    ports:
      - "127.0.0.1:4010:8080"  # Keep localhost binding for direct access (debugging)
    environment:
      VITE_API_URL: https://api.fairmediator.ai
    labels:
      # Traefik routing for frontend
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "Host(`fairmediator.ai`) || Host(`www.fairmediator.ai`)"
      traefik.http.routers.frontend.entrypoints: "websecure"
      traefik.http.routers.frontend.tls.certresolver: "letsencrypt"
      traefik.http.services.frontend.loadbalancer.server.port: "8080"
      # Security headers
      traefik.http.middlewares.frontend-headers.headers.sslredirect: "true"
      traefik.http.middlewares.frontend-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.frontend-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.frontend-headers.headers.stsPreload: "true"
      traefik.http.routers.frontend.middlewares: "frontend-headers"

  # MongoDB: Keep same config but expose publicly for remote access (optional)
  mongodb:
    ports:
      - "127.0.0.1:4030:27017"  # Keep MongoDB localhost-only for security
      # If you need remote MongoDB access, uncomment:
      # - "0.0.0.0:4030:27017"

# Volumes
volumes:
  fairmediator_mongodb_data:
  fairmediator_mongodb_config:
  fairmediator_backend_node_modules:
  traefik_letsencrypt:
    driver: local
    name: ${COMPOSE_PROJECT_NAME:-fairmediator}_traefik_letsencrypt

# Networks remain the same
networks:
  backend-network:
  db-network:
