# Management & Monitoring Stack for FairMediator
# Includes: Traefik, Prometheus, Grafana, cAdvisor, Node Exporter
# NOTE: Portainer and Watchtower are already running globally - no need to duplicate!
# Run with: docker-compose -f docker-compose.management.yml up -d

name: fairmediator-management

services:
  # ==================== NOTE: Portainer Already Running ====================
  # You already have Portainer running on ports 9000/9443
  # The labels added to docker-compose.yml will make FairMediator containers
  # appear organized in your existing Portainer automatically!
  #
  # To view FairMediator in Portainer:
  # 1. Go to http://localhost:9000 or https://localhost:9443
  # 2. Filter containers by "fairmediator" or use label filters
  # ==========================================================================

  # ==================== Traefik (Reverse Proxy + SSL) ====================
  traefik:
    image: traefik:v2.11
    container_name: fairmediator-traefik
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
      - "127.0.0.1:4020:8080"  # Traefik Dashboard (FairMediator port range: 4000-4499)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/etc/traefik
      - traefik_letsencrypt:/letsencrypt
    networks:
      - management-network
      - fairmediator_backend_network  # Connect to app network
    command:
      # API and dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true"  # Dashboard on :8080
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=fairmediator_backend_network"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt (uncomment for production)
      # - "--certificatesresolvers.letsencrypt.acme.email=your-email@example.com"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    labels:
      com.fairmediator.service: "traefik"
      com.fairmediator.description: "Reverse proxy with automatic SSL"
      com.fairmediator.stack: "management"
      # Traefik dashboard routing
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: "Host(`traefik.localhost`)"
      traefik.http.routers.traefik.service: "api@internal"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== NOTE: Watchtower Already Running ====================
  # You already have Watchtower running globally
  # The labels added to docker-compose.yml will be picked up by your existing
  # Watchtower for auto-updates!
  # ==========================================================================

  # ==================== Prometheus (Metrics Collection) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: fairmediator-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:4021:9090"  # Prometheus (FairMediator port range: 4000-4499)
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - management-network
      - fairmediator_backend_network  # To scrape app metrics
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    labels:
      com.fairmediator.service: "prometheus"
      com.fairmediator.description: "Metrics collection and time-series database"
      com.fairmediator.stack: "management"
      traefik.enable: "true"
      traefik.http.routers.prometheus.rule: "Host(`prometheus.localhost`)"
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ==================== Grafana (Beautiful Dashboards) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: fairmediator-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:4022:4022"  # Grafana (FairMediator port range: 4000-4499)
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - management-network
    environment:
      # Security
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-change_me_in_production}
      # Server settings
      - GF_SERVER_HTTP_PORT=4022
      - GF_SERVER_ROOT_URL=http://grafana.localhost
      - GF_SERVER_DOMAIN=grafana.localhost
      # Prometheus datasource
      - GF_DATASOURCES_DEFAULT_NAME=Prometheus
      # Anonymous access (disable in production)
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Plugins
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    labels:
      com.fairmediator.service: "grafana"
      com.fairmediator.description: "Beautiful monitoring dashboards and analytics"
      com.fairmediator.stack: "management"
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "Host(`grafana.localhost`)"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - prometheus

  # ==================== cAdvisor (Container Metrics) ====================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: fairmediator-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:4023:8080"  # cAdvisor (FairMediator port range: 4000-4499)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - management-network
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      com.fairmediator.service: "cadvisor"
      com.fairmediator.description: "Container resource usage and performance metrics"
      com.fairmediator.stack: "management"
      traefik.enable: "true"
      traefik.http.routers.cadvisor.rule: "Host(`cadvisor.localhost`)"
      traefik.http.services.cadvisor.loadbalancer.server.port: "8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==================== Node Exporter (System Metrics) ====================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: fairmediator-node-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:4024:9100"  # Node Exporter (FairMediator port range: 4000-4499)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - management-network
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    labels:
      com.fairmediator.service: "node-exporter"
      com.fairmediator.description: "System-level metrics (CPU, memory, disk, network)"
      com.fairmediator.stack: "management"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  traefik_letsencrypt:
    driver: local
    name: fairmediator_traefik_certs
  prometheus_data:
    driver: local
    name: fairmediator_prometheus_data
  grafana_data:
    driver: local
    name: fairmediator_grafana_data

networks:
  management-network:
    name: fairmediator_management_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  # Connect to existing app network
  fairmediator_backend_network:
    external: true
