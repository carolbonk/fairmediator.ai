# ULTRA-LEAN Monitoring for FairMediator
# Only essential monitoring - uses ~300MB RAM total
# Already have: Portainer + Watchtower (no duplicates!)
# This adds: Just metrics collection for Portainer to display

version: '3.8'

name: fairmediator-monitoring-lite

services:
  # ==================== cAdvisor (Container Metrics) ====================
  # Provides metrics that Portainer can display
  # RAM: ~100-150MB
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: fairmediator-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:4023:8080"  # cAdvisor (FairMediator port range: 4000-4499)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - fairmediator_backend_network
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      com.fairmediator.service: "cadvisor"
      com.fairmediator.description: "Lightweight container metrics"
      com.fairmediator.stack: "monitoring"
      com.centurylinklabs.watchtower.enable: "true"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.2'       # Minimal CPU
          memory: 150M      # Lean memory limit
        reservations:
          cpus: '0.1'
          memory: 100M

networks:
  fairmediator_backend_network:
    external: true

# NO VOLUMES = NO DISK USAGE
# All data is ephemeral and in-memory
